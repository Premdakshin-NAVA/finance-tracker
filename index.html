<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f9f7;--surf:#fcfcfb;--surf2:#f5f5f4;
  --bdr:#e5e5e3;--grid:#e1e0d9;--baseline:#c3c2b7;
  --tx:#0b0b0b;--tx2:#52514e;--txm:#898781;
  --acc:#2563eb;--acc-bg:#eff6ff;--acc-tx:#1d4ed8;
  --bar:#2a78d6;--bar-hi:#1c5cab;
  --ok-bg:#f0fdf4;--ok-tx:#15803d;
  --warn-bg:#fffbeb;--warn-tx:#b45309;
  --err-bg:#fef2f2;--err-tx:#b91c1c;
  --r:8px;--font:'Inter',sans-serif
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}
button{font-family:var(--font)}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#134e4a 0%,#15803d 100%)}
.login-box{background:var(--surf);border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.login-logo-icon{width:36px;height:36px;background:#15803d;border-radius:8px;display:flex;align-items:center;justify-content:center}
.login-logo-icon i{color:#fff;font-size:19px}
.login-title{font-size:20px;font-weight:600}
.login-sub{font-size:13px;color:var(--txm);margin-top:1px}
.login-field{margin-bottom:14px}
.login-lbl{font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:5px;display:block}
.login-input{width:100%;padding:10px 12px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--bg);font-size:13px;color:var(--tx);font-family:var(--font);outline:none}
.login-input:focus{border-color:#15803d;box-shadow:0 0 0 3px rgba(21,128,61,.12)}
.login-btn{width:100%;padding:11px;border-radius:var(--r);background:#15803d;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:background .15s}
.login-btn:hover{background:#136c34}
.login-btn:disabled{background:#86c79d;cursor:not-allowed}
.login-msg{border-radius:var(--r);padding:10px 12px;font-size:13px;margin-bottom:14px;display:none}
.login-msg.err{background:var(--err-bg);color:var(--err-tx);border:1px solid #fecaca}
.login-msg.ok{background:var(--ok-bg);color:var(--ok-tx);border:1px solid #bbf7d0}
.login-toggle{font-size:12px;color:var(--txm);text-align:center;margin-top:16px}
.login-toggle a{color:#15803d;cursor:pointer;font-weight:500;text-decoration:none}

/* ── SHELL ── */
.app{height:100vh;display:none}
.app.on{display:flex}
.sb{width:210px;min-width:210px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column}
.sb-logo{padding:16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px}
.sb-icon{width:28px;height:28px;background:#15803d;border-radius:6px;display:flex;align-items:center;justify-content:center}
.sb-icon i{color:#fff;font-size:15px}
.sb-title{font-size:14px;font-weight:600}
.nav{padding:8px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:13px;color:var(--tx2);cursor:pointer;transition:all .12s}
.nav-item:hover{background:var(--bg);color:var(--tx)}
.nav-item.active{background:var(--acc-bg);color:var(--acc-tx);font-weight:500;border-right:2px solid var(--acc)}
.nav-item i{font-size:16px}
.nav-badge{margin-left:auto;background:var(--warn-bg);color:var(--warn-tx);font-size:11px;font-weight:600;border-radius:10px;padding:0 7px;display:none}
.sb-user{padding:12px 16px;border-top:1px solid var(--bdr);font-size:12px;color:var(--txm);display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-user span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user i{cursor:pointer;font-size:16px;color:var(--tx2)}
.main{flex:1;overflow-y:auto;padding:24px 28px}
.view{max-width:1060px;margin:0 auto}
.pg-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.pg-title{font-size:18px;font-weight:600}

/* ── UI bits ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--surf);font-size:13px;font-weight:500;color:var(--tx);cursor:pointer;transition:all .12s}
.btn:hover{background:var(--surf2)}
.btn.pri{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.pri:hover{background:#1d4ed8}
.btn.danger{color:var(--err-tx)}
.btn.sm{padding:5px 10px;font-size:12px}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:18px}
.sel,.inp{padding:7px 10px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--surf);font-size:13px;color:var(--tx);font-family:var(--font);outline:none}
.sel:focus,.inp:focus{border-color:var(--acc)}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;border-radius:12px;padding:2px 9px;background:var(--surf2);color:var(--tx2);white-space:nowrap}
.chip .dot{width:8px;height:8px;border-radius:50%}
.chip.review{background:var(--warn-bg);color:var(--warn-tx)}
.empty{color:var(--txm);font-size:13px;text-align:center;padding:36px 0}
.muted{color:var(--txm);font-size:12px}

/* ── DASHBOARD ── */
.mnav{display:flex;align-items:center;gap:8px}
.mnav button{border:1px solid var(--bdr);background:var(--surf);border-radius:6px;width:28px;height:28px;cursor:pointer;color:var(--tx2)}
.mnav .mlabel{font-size:14px;font-weight:600;min-width:150px;text-align:center}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.tile{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px}
.tile .t-lbl{font-size:12px;color:var(--txm);margin-bottom:4px}
.tile .t-val{font-size:22px;font-weight:600}
.tile .t-sub{font-size:11px;color:var(--txm);margin-top:2px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.dash-grid{grid-template-columns:1fr}}
.card h3{font-size:13px;font-weight:600;margin-bottom:14px}
.hbar-row{display:grid;grid-template-columns:120px 1fr 78px;align-items:center;gap:10px;padding:4px 0;cursor:default}
.hbar-lbl{font-size:12px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
.hbar-track{height:14px;position:relative}
.hbar-fill{position:absolute;left:0;top:1px;height:12px;background:var(--bar);border-radius:0 4px 4px 0;min-width:2px}
.hbar-val{font-size:12px;color:var(--tx);font-variant-numeric:tabular-nums}
.trend{display:flex;align-items:flex-end;gap:10px;height:150px;padding-top:18px}
.trend-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:5px}
.trend-bar{width:70%;max-width:44px;background:var(--bar);border-radius:4px 4px 0 0;min-height:2px}
.trend-col.cur .trend-bar{background:var(--bar-hi)}
.trend-val{font-size:10px;color:var(--tx2);font-variant-numeric:tabular-nums;height:14px}
.trend-m{font-size:11px;color:var(--txm)}
.trend-base{border-top:1px solid var(--baseline);margin-top:0}
.toplist .hbar-row{grid-template-columns:1fr 90px}
.insight-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.insight-row:last-child{border-bottom:none}
.insight-row .up{color:var(--err-tx);font-variant-numeric:tabular-nums}
.insight-row .down{color:var(--ok-tx);font-variant-numeric:tabular-nums}
.insight-row .flat{color:var(--tx2);font-variant-numeric:tabular-nums}

/* ── TABLE ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.filters .inp{width:180px}
table{width:100%;border-collapse:collapse;background:var(--surf);border:1px solid var(--bdr);border-radius:12px;overflow:hidden}
.tbl-wrap{border:1px solid var(--bdr);border-radius:12px;overflow:hidden;background:var(--surf)}
.tbl-wrap table{border:none}
th{font-size:11px;font-weight:600;color:var(--txm);text-transform:uppercase;letter-spacing:.05em;text-align:left;padding:10px 12px;background:var(--surf2);border-bottom:1px solid var(--bdr)}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--surf2)}
.amt{font-variant-numeric:tabular-nums;font-weight:500;text-align:right;white-space:nowrap}
.amt.credit{color:var(--ok-tx)}
.td-merch{font-weight:500}
.td-merch .muted{font-weight:400}
.td-notes{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:help}
.loadmore{text-align:center;margin-top:14px}

/* ── REVIEW ── */
.rev-item{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.rev-main{flex:1;min-width:200px}
.rev-merch{font-weight:600;font-size:14px}
.rev-amt{font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
.rev-amt.credit{color:var(--ok-tx)}
.rev-ctl{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rev-ctl label{font-size:12px;color:var(--tx2);display:flex;align-items:center;gap:5px;white-space:nowrap}

/* ── CATEGORIES ── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
@media(max-width:900px){.cat-grid{grid-template-columns:1fr}}
.cat-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px}
.cat-row:last-child{border-bottom:none}
.cat-row .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-row i.tabler{font-size:15px;color:var(--tx2)}
.cat-row .grow{flex:1}
.cat-row .acts{display:flex;gap:8px}
.cat-row .acts i{cursor:pointer;color:var(--txm);font-size:15px}
.cat-row .acts i:hover{color:var(--tx)}
.cat-row.archived .grow{color:var(--txm);text-decoration:line-through}
.addform{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.addform .inp{flex:1;min-width:120px}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal-bg.on{display:flex}
.modal{background:var(--surf);border-radius:14px;padding:22px;width:100%;max-width:440px;max-height:92vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.f{margin-bottom:12px}
.f label{font-size:12px;font-weight:500;color:var(--tx2);display:block;margin-bottom:4px}
.f .inp,.f .sel{width:100%}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg{display:flex;border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden}
.seg button{flex:1;padding:8px;border:none;background:var(--surf);font-size:13px;color:var(--tx2);cursor:pointer}
.seg button.on{background:var(--acc-bg);color:var(--acc-tx);font-weight:600}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.modal-acts .btn.danger{margin-right:auto}
.remember{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);margin-top:2px}

/* ── TOAST / TIP ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a19;color:#fff;border-radius:10px;padding:10px 16px;font-size:13px;display:none;align-items:center;gap:12px;z-index:80;box-shadow:0 8px 30px rgba(0,0,0,.25);max-width:90vw}
#toast button{background:#3987e5;border:none;color:#fff;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
#tip{position:fixed;background:#1a1a19;color:#fff;font-size:12px;border-radius:6px;padding:5px 9px;pointer-events:none;display:none;z-index:90;white-space:nowrap}

/* ── MOBILE ── */
@media(max-width:720px){
  .app.on{flex-direction:column}
  .sb{width:100%;min-width:0;flex-direction:row;align-items:center;border-right:none;border-bottom:1px solid var(--bdr)}
  .sb-logo{border-bottom:none;padding:10px 12px}
  .sb-logo .sb-title{display:none}
  .nav{display:flex;padding:0;flex:1;justify-content:center;gap:2px}
  .nav-item{padding:10px;border-right:none}
  .nav-item.active{border-right:none;border-bottom:2px solid var(--acc)}
  .nav-item i{font-size:18px}
  .nav-item .nav-lbl{display:none}
  .sb-user{border-top:none;padding:10px 12px}
  .sb-user span{display:none}
  .main{padding:14px 12px}
  .hbar-row{grid-template-columns:90px 1fr 70px}
  .filters .inp{width:100%}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-wallet"></i></div>
      <div><div class="login-title">Finance Tracker</div><div class="login-sub">Personal expense portal</div></div>
    </div>
    <div class="login-msg" id="loginMsg"></div>
    <form id="loginForm">
      <div class="login-field"><label class="login-lbl">Email</label><input class="login-input" type="email" id="lEmail" autocomplete="username" required></div>
      <div class="login-field"><label class="login-lbl">Password</label><input class="login-input" type="password" id="lPass" autocomplete="current-password" required minlength="8"></div>
      <button class="login-btn" id="lBtn" type="submit">Sign in</button>
    </form>
    <div class="login-toggle" id="loginToggle">First time here? <a onclick="setAuthMode('signup')">Create the owner account</a></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="sb">
    <div class="sb-logo"><div class="sb-icon"><i class="ti ti-wallet"></i></div><div class="sb-title">Finance Tracker</div></div>
    <div class="nav">
      <div class="nav-item" data-v="dash" onclick="nav('dash')"><i class="ti ti-layout-dashboard"></i><span class="nav-lbl">Dashboard</span></div>
      <div class="nav-item" data-v="tx" onclick="nav('tx')"><i class="ti ti-list-details"></i><span class="nav-lbl">Transactions</span></div>
      <div class="nav-item" data-v="review" onclick="nav('review')"><i class="ti ti-alert-circle"></i><span class="nav-lbl">Review</span><span class="nav-badge" id="revBadge"></span></div>
      <div class="nav-item" data-v="cats" onclick="nav('cats')"><i class="ti ti-tags"></i><span class="nav-lbl">Categories</span></div>
    </div>
    <div class="sb-user"><span id="userEmail"></span><i class="ti ti-logout" title="Sign out" onclick="signOut()"></i></div>
  </div>
  <div class="main">
    <div class="view" id="view-dash"></div>
    <div class="view" id="view-tx" style="display:none"></div>
    <div class="view" id="view-review" style="display:none"></div>
    <div class="view" id="view-cats" style="display:none"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<div id="toast"></div>
<div id="tip"></div>

<script>
const SUPA_URL='https://moatomqvfwwpvnhwnfiy.supabase.co';
const SUPA_KEY='sb_publishable_70rig7lwmQwfCC2kOL5tZQ_2jWjUL0S';
const db=supabase.createClient(SUPA_URL,SUPA_KEY);

let cats=[],rules=[],keywords=[],view='dash';
const PAYMENT_MODES=['Google Pay','PhonePe','Paytm','Amazon Pay','UPI','RuPay Card','Credit Card','Debit Card','Online Transaction','Wallet','Cash'];
let dashDate=new Date();dashDate.setDate(1);dashDate.setHours(0,0,0,0);
let txFilters={month:'cur',cat:'all',status:'all',mode:'all',q:''};
let txPage=0;const TX_PAGE=50;

const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const escLike=s=>s.replace(/[%_\\]/g,m=>'\\'+m);
const fmt=(n,c)=>new Intl.NumberFormat('en-IN',{style:'currency',currency:c||'INR',maximumFractionDigits:2,minimumFractionDigits:0}).format(+n||0);
const fmtD=d=>new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
const fmtDT=d=>new Date(d).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'});
const monthLabel=d=>d.toLocaleDateString('en-IN',{month:'long',year:'numeric'});
const catById=id=>cats.find(c=>c.id===id);

/* ── AUTH ── */
let authMode='signin';
function setAuthMode(m){
  authMode=m;
  $('#lBtn').textContent=m==='signup'?'Create account':'Sign in';
  $('#loginToggle').innerHTML=m==='signup'
    ?'Already registered? <a onclick="setAuthMode(\'signin\')">Sign in</a>'
    :'First time here? <a onclick="setAuthMode(\'signup\')">Create the owner account</a>';
  loginMsg('');
}
function loginMsg(t,ok){const el=$('#loginMsg');el.textContent=t;el.className='login-msg '+(ok?'ok':'err');el.style.display=t?'block':'none';}
$('#loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const email=$('#lEmail').value.trim(),password=$('#lPass').value;
  $('#lBtn').disabled=true;loginMsg('');
  try{
    if(authMode==='signup'){
      const {error}=await db.auth.signUp({email,password});
      if(error)throw error;
      loginMsg('Account created. Check your email for a confirmation link, then come back and sign in.',true);
      setTimeout(()=>setAuthMode('signin'),400);
    }else{
      const {error}=await db.auth.signInWithPassword({email,password});
      if(error)throw error;
    }
  }catch(err){
    let m=err.message||'Something went wrong';
    if(/database error/i.test(m)&&authMode==='signup')m='Sign-ups are restricted to the portal owner.';
    loginMsg(m);
  }
  $('#lBtn').disabled=false;
});
async function signOut(){await db.auth.signOut();}
db.auth.onAuthStateChange((_e,session)=>{
  if(session){
    $('#userEmail').textContent=session.user.email;
    $('#loginWrap').style.display='none';
    $('#app').classList.add('on');
    enterApp();
  }else{
    appLoaded=false;
    $('#app').classList.remove('on');
    $('#loginWrap').style.display='flex';
  }
});

let appLoaded=false;
async function enterApp(){
  if(appLoaded)return;appLoaded=true;
  await Promise.all([loadCats(),loadRules(),loadKeywords()]);
  refreshReviewBadge();
  nav('dash');
}

/* ── DATA ── */
async function loadCats(){const{data}=await db.from('categories').select('*').order('sort');cats=data||[];}
async function loadRules(){const{data}=await db.from('merchant_rules').select('*').order('pattern');rules=data||[];}
async function loadKeywords(){const{data}=await db.from('category_keywords').select('*').order('keyword');keywords=data||[];}
function wordMatch(pat,m){
  const escRe=pat.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return new RegExp('(^|[^a-z0-9])'+escRe+'([^a-z0-9]|$)').test(m);
}
function ruleMatches(r,m){
  if(r.match_type==='exact')return m===r.pattern;
  if(!m.includes(r.pattern))return false;
  if(r.pattern.length>4)return true;
  // short patterns ('ola','jio') must match as a whole word, not as a substring
  return wordMatch(r.pattern,m);
}
function suggestCat(merchant){
  if(!merchant)return null;
  const m=merchant.toLowerCase();
  const hit=rules.filter(r=>ruleMatches(r,m)).sort((a,b)=>(b.match_type==='exact')-(a.match_type==='exact')||b.pattern.length-a.pattern.length)[0];
  if(hit)return hit.category_id;
  // no merchant rule — fall back to a generic keyword hint (suggestion only,
  // never auto-applied at ingestion), always whole-word matched since these
  // are common English words that can appear inside unrelated names.
  const kw=keywords.filter(k=>wordMatch(k.keyword,m)).sort((a,b)=>b.keyword.length-a.keyword.length)[0];
  return kw?kw.category_id:null;
}
async function refreshReviewBadge(){
  const{count}=await db.from('transactions').select('id',{count:'exact',head:true}).eq('status','needs_review');
  const b=$('#revBadge');
  b.style.display=count>0?'inline-block':'none';
  b.textContent=count||'';
  return count||0;
}

/* ── NAV ── */
function nav(v){
  view=v;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.v===v));
  document.querySelectorAll('.view').forEach(s=>s.style.display=s.id==='view-'+v?'':'none');
  ({dash:renderDash,tx:renderTx,review:renderReview,cats:renderCats})[v]();
}

/* ── DASHBOARD ── */
function shiftMonth(n){dashDate=new Date(dashDate.getFullYear(),dashDate.getMonth()+n,1);renderDash();}
async function renderDash(){
  const el=$('#view-dash');
  el.innerHTML='<div class="empty">Loading…</div>';
  const m0=new Date(dashDate),m1=new Date(m0.getFullYear(),m0.getMonth()+1,1);
  const t0=new Date(m0.getFullYear(),m0.getMonth()-5,1);
  const[{data:rows},reviewN]=await Promise.all([
    db.from('transactions').select('amount,direction,occurred_at,category_id,merchant,currency,payment_mode').gte('occurred_at',t0.toISOString()).lt('occurred_at',m1.toISOString()).order('occurred_at',{ascending:false}).limit(5000),
    refreshReviewBadge()
  ]);
  const all=rows||[];
  const inMonth=all.filter(r=>new Date(r.occurred_at)>=m0);
  const spent=inMonth.filter(r=>r.direction==='debit').reduce((s,r)=>s+ +r.amount,0);
  const income=inMonth.filter(r=>r.direction==='credit').reduce((s,r)=>s+ +r.amount,0);

  // spend by category (selected month, debits)
  const byCat={};
  inMonth.filter(r=>r.direction==='debit').forEach(r=>{
    const k=r.category_id||'_none';
    byCat[k]=byCat[k]||{amt:0,n:0};byCat[k].amt+=+r.amount;byCat[k].n++;
  });
  const catRows=Object.entries(byCat).map(([k,v])=>({
    name:k==='_none'?'Uncategorized':(catById(k)?.name||'Unknown'),...v
  })).sort((a,b)=>b.amt-a.amt);
  const maxCat=catRows[0]?.amt||1;

  // spend by payment mode (selected month, debits)
  const byMode={};
  inMonth.filter(r=>r.direction==='debit').forEach(r=>{
    const k=r.payment_mode||'Unknown';
    byMode[k]=byMode[k]||{amt:0,n:0};byMode[k].amt+=+r.amount;byMode[k].n++;
  });
  const modeRows=Object.entries(byMode).map(([name,v])=>({name,...v})).sort((a,b)=>b.amt-a.amt);
  const maxMode=modeRows[0]?.amt||1;

  // 6-month trend (debits)
  const buckets=[];
  for(let i=5;i>=0;i--){
    const s=new Date(m0.getFullYear(),m0.getMonth()-i,1),e=new Date(s.getFullYear(),s.getMonth()+1,1);
    buckets.push({s,e,lbl:s.toLocaleDateString('en-IN',{month:'short'}),amt:0});
  }
  all.filter(r=>r.direction==='debit').forEach(r=>{
    const d=new Date(r.occurred_at);
    const b=buckets.find(b=>d>=b.s&&d<b.e);
    if(b)b.amt+=+r.amount;
  });
  const maxTrend=Math.max(...buckets.map(b=>b.amt),1);

  const top=inMonth.filter(r=>r.direction==='debit').sort((a,b)=>b.amount-a.amount).slice(0,5);

  // month-over-month insights: spend delta, biggest category movers, new merchants
  const prevBucket=buckets[4],curBucket=buckets[5];
  const momDelta=curBucket.amt-prevBucket.amt;
  const momPct=prevBucket.amt>0?(momDelta/prevBucket.amt*100):(curBucket.amt>0?100:0);
  const prevByCat={};
  all.filter(r=>r.direction==='debit'&&new Date(r.occurred_at)>=prevBucket.s&&new Date(r.occurred_at)<prevBucket.e).forEach(r=>{
    const k=r.category_id||'_none';
    prevByCat[k]=(prevByCat[k]||0)+ +r.amount;
  });
  const movers=[...new Set([...Object.keys(byCat),...Object.keys(prevByCat)])].map(k=>({
    name:k==='_none'?'Uncategorized':(catById(k)?.name||'Unknown'),
    delta:(byCat[k]?.amt||0)-(prevByCat[k]||0)
  })).filter(x=>Math.abs(x.delta)>=1).sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta)).slice(0,3);
  const priorMerchants=new Set(all.filter(r=>new Date(r.occurred_at)<m0&&r.merchant).map(r=>r.merchant.trim().toLowerCase()));
  const newMerchantCount=new Set(inMonth.filter(r=>r.direction==='debit'&&r.merchant&&!priorMerchants.has(r.merchant.trim().toLowerCase())).map(r=>r.merchant.trim().toLowerCase())).size;
  const hasInsights=prevBucket.amt>0||curBucket.amt>0;

  el.innerHTML=`
  <div class="pg-head">
    <div class="pg-title">Dashboard</div>
    <div class="mnav">
      <button onclick="shiftMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <div class="mlabel">${monthLabel(m0)}</div>
      <button onclick="shiftMonth(1)" ${m1>new Date()?'disabled':''}><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  <div class="tiles">
    <div class="tile"><div class="t-lbl">Spent</div><div class="t-val">${fmt(spent)}</div><div class="t-sub">${inMonth.filter(r=>r.direction==='debit').length} payments</div></div>
    <div class="tile"><div class="t-lbl">Income</div><div class="t-val">${fmt(income)}</div></div>
    <div class="tile"><div class="t-lbl">Transactions</div><div class="t-val">${inMonth.length}</div></div>
    <div class="tile" style="cursor:pointer" onclick="nav('review')"><div class="t-lbl">Needs review</div><div class="t-val" style="color:${reviewN>0?'var(--warn-tx)':'inherit'}">${reviewN}</div><div class="t-sub">${reviewN>0?'tap to review':'all clear'}</div></div>
  </div>
  ${hasInsights?`<div class="card" style="margin-bottom:14px">
    <h3>Insights</h3>
    <div class="insight-row">
      <span>Spend vs previous month</span>
      <span class="${momDelta>0?'up':momDelta<0?'down':'flat'}">${momDelta===0?'no change':(momDelta>0?'+':'')+fmt(momDelta)+' ('+(momDelta>=0?'+':'')+momPct.toFixed(0)+'%)'}</span>
    </div>
    ${movers.map(m=>`
    <div class="insight-row">
      <span>${esc(m.name)}</span>
      <span class="${m.delta>0?'up':'down'}">${m.delta>0?'+':''}${fmt(m.delta)} vs last month</span>
    </div>`).join('')}
    ${newMerchantCount>0?`<div class="insight-row"><span>New merchants this month</span><span class="flat">${newMerchantCount}</span></div>`:''}
  </div>`:''}
  <div class="dash-grid">
    <div>
      <div class="card" style="margin-bottom:14px">
        <h3>Spend by category</h3>
        ${catRows.length?catRows.map(r=>`
          <div class="hbar-row" data-tip="${esc(r.name)}: ${fmt(r.amt)} · ${r.n} txn${r.n>1?'s':''}">
            <div class="hbar-lbl">${esc(r.name)}</div>
            <div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(r.amt/maxCat*100,1)}%"></div></div>
            <div class="hbar-val">${fmt(r.amt)}</div>
          </div>`).join(''):'<div class="empty">No spending recorded this month</div>'}
      </div>
      <div class="card">
        <h3>Spend by payment mode</h3>
        ${modeRows.length?modeRows.map(r=>`
          <div class="hbar-row" data-tip="${esc(r.name)}: ${fmt(r.amt)} · ${r.n} txn${r.n>1?'s':''}">
            <div class="hbar-lbl">${esc(r.name)}</div>
            <div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(r.amt/maxMode*100,1)}%"></div></div>
            <div class="hbar-val">${fmt(r.amt)}</div>
          </div>`).join(''):'<div class="empty">No spending recorded this month</div>'}
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:14px">
        <h3>Monthly spend — last 6 months</h3>
        <div class="trend">
          ${buckets.map((b,i)=>`
            <div class="trend-col ${i===5?'cur':''}" data-tip="${b.s.toLocaleDateString('en-IN',{month:'long',year:'numeric'})}: ${fmt(b.amt)}">
              <div class="trend-val">${(i===5||b.amt===maxTrend)&&b.amt>0?fmt(b.amt):''}</div>
              <div class="trend-bar" style="height:${Math.max(b.amt/maxTrend*100,2)}%"></div>
            </div>`).join('')}
        </div>
        <div class="trend-base"></div>
        <div class="trend" style="height:auto;padding-top:4px">
          ${buckets.map(b=>`<div class="trend-col"><div class="trend-m">${b.lbl}</div></div>`).join('')}
        </div>
      </div>
      <div class="card toplist">
        <h3>Largest expenses</h3>
        ${top.length?top.map(r=>`
          <div class="hbar-row">
            <div class="hbar-lbl" style="text-align:left">${esc(r.merchant||'(no merchant)')} <span class="muted">· ${fmtD(r.occurred_at)}</span></div>
            <div class="hbar-val" style="text-align:right">${fmt(r.amount,r.currency)}</div>
          </div>`).join(''):'<div class="empty">Nothing yet</div>'}
      </div>
    </div>
  </div>`;
  bindTips(el);
}

/* ── TRANSACTIONS ── */
function monthOptions(){
  let out='<option value="all">All time</option>';
  const now=new Date();
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const v=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const sel=(txFilters.month==='cur'&&i===0)||txFilters.month===v;
    out+=`<option value="${v}" ${sel?'selected':''}>${monthLabel(d)}</option>`;
  }
  return out;
}
function setTxFilter(k,v){txFilters[k]=v;txPage=0;renderTx();}
function buildTxQuery(){
  let q=db.from('transactions').select('*').order('occurred_at',{ascending:false});
  const mv=txFilters.month==='cur'?`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`:txFilters.month;
  if(mv!=='all'){
    const[y,m]=mv.split('-').map(Number);
    q=q.gte('occurred_at',new Date(y,m-1,1).toISOString()).lt('occurred_at',new Date(y,m,1).toISOString());
  }
  if(txFilters.cat==='none')q=q.is('category_id',null);
  else if(txFilters.cat!=='all')q=q.eq('category_id',txFilters.cat);
  if(txFilters.status!=='all')q=q.eq('status',txFilters.status);
  if(txFilters.mode==='none')q=q.is('payment_mode',null);
  else if(txFilters.mode!=='all')q=q.eq('payment_mode',txFilters.mode);
  if(txFilters.q){const s=escLike(txFilters.q.replace(/,/g,' ').trim());q=q.or(`merchant.ilike.%${s}%,notes.ilike.%${s}%`);}
  return q;
}
async function exportCsv(){
  const{data}=await buildTxQuery().limit(10000);
  const rows=data||[];
  if(!rows.length){toast('Nothing to export for the current filters');return;}
  const cols=['occurred_at','direction','amount','currency','merchant','category','status','channel','payment_mode','account','ref_no','source','notes'];
  const csv=[cols.join(',')].concat(rows.map(t=>{
    const vals=[t.occurred_at,t.direction,t.amount,t.currency,t.merchant,catById(t.category_id)?.name||'',t.status,t.channel,t.payment_mode,t.account_hint,t.ref_no,t.source,t.notes];
    return vals.map(v=>{v=v==null?'':String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(',');
  })).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='transactions.csv';a.click();
  toast(`Exported ${rows.length} transactions`);
}

        <td class="muted">${esc(t.payment_mode||t.channel||'')}</td>
        <td class="muted td-notes" title="${noteFull}">${notePreview}</td>
        <td class="amt ${t.direction==='credit'?'credit':''}">${t.direction==='credit'?'+':''}${fmt(t.amount,t.currency)}</td>
      </tr>`;}).join('')}</tbody>

async function openTxModal(id){
  let t={direction:'debit',amount:'',occurred_at:new Date().toISOString(),merchant:'',category_id:null,channel:'',account_hint:'',notes:'',currency:'INR'};
  if(!id&&rawPrefill)t.notes=rawPrefill.notes;
  if(id){
    const{data}=await db.from('transactions').select('*').eq('id',id).single();
    if(data)t=data;
  }
  const local=new Date(new Date(t.occurred_at).getTime()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);
  $('#modalBox').innerHTML=`
  <h3>${id?'Edit':'Add'} transaction</h3>
  <div class="f"><div class="seg" id="segDir">
    <button type="button" class="${t.direction==='debit'?'on':''}" data-d="debit">Expense</button>
    <button type="button" class="${t.direction==='credit'?'on':''}" data-d="credit">Income</button>
  </div></div>
  <div class="f2">
    <div class="f"><label>Amount (₹)</label><input class="inp" id="mAmt" type="number" step="0.01" min="0" value="${t.amount}" required></div>
    <div class="f"><label>Date &amp; time</label><input class="inp" id="mDate" type="datetime-local" value="${local}"></div>
  </div>
  <div class="f"><label>Merchant / payee</label><input class="inp" id="mMerch" value="${esc(t.merchant||'')}" placeholder="e.g. Swiggy"></div>
  <div class="f"><label>Category</label><select class="sel" id="mCat" onchange="handleCatSelect(this,'— needs review —')">
    ${catOptionsHtml(t.category_id,'— needs review —')}
  </select>
  <label class="remember"><input type="checkbox" id="mRemember"> Remember this merchant → category for the future</label></div>
  <div class="f2">
    <div class="f"><label>Channel</label><select class="sel" id="mChan">
      <option value="">—</option>
      ${['upi','card','netbanking','cash','wallet','other'].map(c=>`<option ${t.channel===c?'selected':''}>${c}</option>`).join('')}
    </select></div>
    <div class="f"><label>Payment mode</label><select class="sel" id="mMode">
      <option value="">—</option>
      ${PAYMENT_MODES.map(m=>`<option ${t.payment_mode===m?'selected':''}>${esc(m)}</option>`).join('')}
    </select></div>
  </div>
  <div class="f"><label>Account (e.g. HDFC ··1234)</label><input class="inp" id="mAcct" value="${esc(t.account_hint||'')}"></div>
  <div class="f"><label>Notes</label><input class="inp" id="mNotes" value="${esc(t.notes||'')}"></div>
  <div class="modal-acts">
    ${id?'<button class="btn danger" onclick="deleteTx(\''+id+'\')"><i class="ti ti-trash"></i>Delete</button>':''}
    <button class="btn" onclick="closeModal()">Cancel</button>
    <button class="btn pri" onclick="saveTx(${id?`'${id}'`:'null'})">Save</button>
  </div>`;
  $('#modalBg').classList.add('on');
  document.querySelectorAll('#segDir button').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#segDir button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  });
  $('#mMerch').addEventListener('input',()=>{
    if(id)return;
    const s=suggestCat($('#mMerch').value);
    if(s&&!$('#mCat').value)$('#mCat').value=s;
  });
}
function closeModal(){$('#modalBg').classList.remove('on');rawPrefill=null;}
async function saveTx(id){
  const amt=parseFloat($('#mAmt').value);
  if(!(amt>=0)||!$('#mAmt').value){toast('Enter a valid amount');return;}
  const catId=$('#mCat').value||null;
  const merchant=$('#mMerch').value.trim()||null;
  const rec={
    amount:amt,
    direction:$('#segDir button.on').dataset.d,
    occurred_at:(isNaN(new Date($('#mDate').value))?new Date():new Date($('#mDate').value)).toISOString(),
    merchant,
    category_id:catId,
    status:catId?'categorized':'needs_review',
    channel:$('#mChan').value||null,
    payment_mode:$('#mMode').value||null,
    account_hint:$('#mAcct').value.trim()||null,
    notes:$('#mNotes').value.trim()||null
  };
  if(!id&&rawPrefill)rec.raw_message_id=rawPrefill.raw_message_id;
  const res=id
    ?await db.from('transactions').update(rec).eq('id',id)
    :await db.from('transactions').insert({...rec,source:'manual'});
  if(res.error){toast('Save failed: '+res.error.message);return;}
  if(!id&&rawPrefill){await db.from('raw_messages').update({parse_status:'parsed'}).eq('id',rawPrefill.raw_message_id);rawPrefill=null;}
  if($('#mRemember').checked&&merchant&&catId)await rememberRule(merchant,catId,false);
  closeModal();
  toast(id?'Transaction updated':'Transaction added');
  refreshReviewBadge();
  if(view==='tx'){txPage=0;renderTx();}else if(view==='dash')renderDash();else if(view==='review')renderReview();
}
async function deleteTx(id){
  if(!confirm('Delete this transaction?'))return;
  const{error}=await db.from('transactions').delete().eq('id',id);
  if(error){toast('Delete failed: '+error.message);return;}
  closeModal();toast('Deleted');refreshReviewBadge();
  if(view==='tx'){txPage=0;renderTx();}else renderDash();
}

/* ── LEARNING LOOP ── */
async function rememberRule(merchant,catId,offerBackfill=true){
  const pat=merchant.trim().toLowerCase();
  if(!pat)return;
  const{error}=await db.from('merchant_rules').upsert({pattern:pat,match_type:'contains',category_id:catId},{onConflict:'pattern,match_type'});
  if(error){toast('Rule save failed: '+error.message);return;}
  await loadRules();
  if(!offerBackfill)return;
  const{data}=await db.from('transactions').select('id,merchant').eq('status','needs_review').ilike('merchant',`%${escLike(pat)}%`);
  const rule={pattern:pat,match_type:'contains'};
  const ids=(data||[]).filter(t=>t.merchant&&ruleMatches(rule,t.merchant.toLowerCase())).map(t=>t.id);
  if(ids.length>0)toast(`${ids.length} more uncategorized transaction${ids.length>1?'s':''} match “${pat}”`,{label:'Apply to all',fn:()=>applyRuleAll(ids,catId)});
}
async function applyRuleAll(ids,catId){
  const{error}=await db.from('transactions').update({category_id:catId,status:'categorized'}).in('id',ids);
  toast(error?'Failed: '+error.message:'Applied to matching transactions');
  refreshReviewBadge();
  if(view==='review')renderReview();else if(view==='tx'){txPage=0;renderTx();}
}

/* ── REVIEW ── */

  const el=$('#view-review');
  el.innerHTML='<div class="empty">Loading…</div>';
  const[{data},{data:raws}]=await Promise.all([
    db.from('transactions').select('*').eq('status','needs_review').order('occurred_at',{ascending:false}).limit(200),
    db.from('raw_messages').select('*').in('parse_status',['pending','failed']).order('received_at',{ascending:false}).limit(100)
  ]);
  const rows=data||[],rawRows=raws||[];
  el.innerHTML=`
  <div class="pg-head"><div class="pg-title">Review queue</div><div class="muted">${rows.length} item${rows.length!==1?'s':''}</div></div>
  ${rows.length?rows.map(t=>{
    const sug=suggestCat(t.merchant);
    const sugColor=sug?catById(sug)?.color||'#898781':'var(--warn-tx)';
    return`<div class="rev-item" id="rev-${t.id}" style="border-left:4px solid ${sugColor}">
      <div class="rev-main">
        <div class="rev-merch">${esc(t.merchant||'(unknown merchant)')}</div>
        <div class="muted">${fmtDT(t.occurred_at)}${t.account_hint?' · '+esc(t.account_hint):''}${t.payment_mode||t.channel?' · '+esc(t.payment_mode||t.channel):''} · ${esc(t.source)}${t.notes?' · '+esc(t.notes):''}</div>
      </div>
      <div class="rev-amt ${t.direction==='credit'?'credit':''}">${t.direction==='credit'?'+':''}${fmt(t.amount,t.currency)}</div>
      <div class="rev-ctl">
        <select class="sel" id="revCat-${t.id}" onchange="handleCatSelect(this,'Pick category…')">
          ${catOptionsHtml(sug,'Pick category…')}
        </select>
        <label><input type="checkbox" id="revRem-${t.id}" ${t.merchant?'checked':'disabled'}>Remember</label>
        <button class="btn pri sm" onclick="saveReview('${t.id}')">Save</button>
        <button class="btn sm" onclick="openTxModal('${t.id}')" title="Edit details"><i class="ti ti-pencil"></i></button>
      </div>
    </div>`;}).join(''):'<div class="empty"><i class="ti ti-circle-check" style="font-size:28px;display:block;margin-bottom:8px;color:var(--ok-tx)"></i>Nothing to review — all transactions are categorized.</div>'}
  ${rawRows.length?`<div class="pg-head" style="margin-top:26px"><div class="pg-title" style="font-size:15px">Unparsed alerts</div><div class="muted">${rawRows.length} — couldn't auto-read these; add manually or ignore</div></div>`+rawRows.map(r=>`
    <div class="rev-item">
      <div class="rev-main">
        <div class="muted">${fmtDT(r.received_at)} · ${esc(r.source)}${r.sender?' · '+esc(r.sender):''}${r.subject?' · '+esc(r.subject):''}</div>
        <div style="font-size:13px;margin-top:4px;white-space:pre-wrap;word-break:break-word">${esc((r.body||'').slice(0,400))}</div>
      </div>
      <div class="rev-ctl">
        <button class="btn pri sm" onclick="convertRaw('${r.id}')">Add manually</button>
        <button class="btn sm" onclick="ignoreRaw('${r.id}')">Ignore</button>
      </div>
    </div>`).join(''):''}`;
}
let rawPrefill=null;
async function convertRaw(rawId){
  const{data:r}=await db.from('raw_messages').select('*').eq('id',rawId).single();
  rawPrefill={raw_message_id:rawId,notes:(r?.body||'').slice(0,140)};
  openTxModal();
}
async function ignoreRaw(id){
  await db.from('raw_messages').update({parse_status:'ignored'}).eq('id',id);
  renderReview();
}
async function saveReview(id){
  const catId=$(`#revCat-${id}`).value;
  if(!catId){toast('Pick a category first');return;}
  const remember=$(`#revRem-${id}`)?.checked;
  const{data:t}=await db.from('transactions').select('merchant').eq('id',id).single();
  const{error}=await db.from('transactions').update({category_id:catId,status:'categorized'}).eq('id',id);
  if(error){toast('Failed: '+error.message);return;}
  document.getElementById('rev-'+id)?.remove();
  refreshReviewBadge();
  if(remember&&t?.merchant)await rememberRule(t.merchant,catId);
  if(!document.querySelector('.rev-item'))renderReview();
}

/* ── CATEGORIES ── */
async function renderCats(){
  const el=$('#view-cats');
  el.innerHTML=`
  <div class="pg-head"><div class="pg-title">Categories &amp; rules</div></div>
  <div class="cat-grid">
    <div class="card">
      <h3>Categories</h3>
      <div>${cats.map(c=>`
        <div class="cat-row ${c.is_archived?'archived':''}">
          <span class="dot" style="background:${c.color||'#898781'}"></span>
          <i class="ti ti-${c.icon||'tag'} tabler"></i>
          <span class="grow">${esc(c.name)}</span>
          <span class="acts">
            <i class="ti ti-pencil" title="Rename" onclick="renameCat('${c.id}')"></i>
            <i class="ti ti-${c.is_archived?'archive-off':'archive'}" title="${c.is_archived?'Unarchive':'Archive'}" onclick="archiveCat('${c.id}',${!c.is_archived})"></i>
          </span>
        </div>`).join('')}</div>
      <div class="addform">
        <input class="inp" id="newCatName" placeholder="New category name">
        <input type="color" id="newCatColor" value="#2a78d6" style="width:38px;height:34px;border:1px solid var(--bdr);border-radius:8px;background:var(--surf);cursor:pointer">
        <button class="btn pri" onclick="addCat()">Add</button>
      </div>
    </div>
    <div class="card">
      <h3>Merchant rules <span class="muted" style="font-weight:400">— “message contains X → category Y”</span></h3>
      <div style="max-height:420px;overflow-y:auto">${rules.map(r=>{
        const c=catById(r.category_id);
        return`<div class="cat-row">
          <span class="grow" style="font-variant-numeric:tabular-nums">${esc(r.pattern)}</span>
          <i class="ti ti-arrow-right tabler"></i>
          <span class="chip"><span class="dot" style="background:${c?.color||'#898781'}"></span>${esc(c?.name||'?')}</span>
          <span class="acts"><i class="ti ti-trash" title="Delete rule" onclick="deleteRule('${r.id}')"></i></span>
        </div>`;}).join('')||'<div class="empty">No rules yet</div>'}</div>
      <div class="addform">
        <input class="inp" id="newRulePat" placeholder="Merchant contains…">
        <select class="sel" id="newRuleCat">${cats.filter(c=>!c.is_archived).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select>
        <button class="btn pri" onclick="addRule()">Add</button>
      </div>
    </div>
    <div class="card">
      <h3>Keyword hints <span class="muted" style="font-weight:400">— generic word → category, suggestion only (never auto-applied)</span></h3>
      <div style="max-height:420px;overflow-y:auto">${keywords.map(k=>{
        const c=catById(k.category_id);
        return`<div class="cat-row">
          <span class="grow" style="font-variant-numeric:tabular-nums">${esc(k.keyword)}</span>
          <i class="ti ti-arrow-right tabler"></i>
          <span class="chip"><span class="dot" style="background:${c?.color||'#898781'}"></span>${esc(c?.name||'?')}</span>
          <span class="acts"><i class="ti ti-trash" title="Delete keyword" onclick="deleteKeyword('${k.id}')"></i></span>
        </div>`;}).join('')||'<div class="empty">No keyword hints yet</div>'}</div>
      <div class="addform">
        <input class="inp" id="newKeyword" placeholder="Word (e.g. cafe)">
        <select class="sel" id="newKeywordCat">${cats.filter(c=>!c.is_archived).map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select>
        <button class="btn pri" onclick="addKeyword()">Add</button>
      </div>
    </div>
  </div>`;
}
async function addCat(){
  const name=$('#newCatName').value.trim();
  if(!name)return;
  const{error}=await db.from('categories').insert({name,color:$('#newCatColor').value,sort:500});
  if(error){toast(error.message.includes('duplicate')?'That category already exists':'Failed: '+error.message);return;}
  await loadCats();renderCats();toast('Category added');
}
/* ── inline "add new category" from any category <select> (tx modal, review queue) ── */
function catOptionsHtml(selectedId,blankLabel){
  return `<option value="">${esc(blankLabel)}</option>`
    +cats.filter(c=>!c.is_archived||c.id===selectedId).map(c=>`<option value="${c.id}" ${selectedId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')
    +`<option value="__new__">+ Add new category…</option>`;
}
async function handleCatSelect(sel,blankLabel){
  if(sel.value!=='__new__')return;
  const name=prompt('New category name');
  if(!name||!name.trim()){sel.value='';return;}
  const{data,error}=await db.from('categories').insert({name:name.trim(),color:'#2a78d6',sort:500}).select('id').single();
  if(error){toast(error.message.includes('duplicate')?'That category already exists':'Failed: '+error.message);sel.value='';return;}
  await loadCats();
  sel.innerHTML=catOptionsHtml(data.id,blankLabel);
  toast('Category added');
}
async function renameCat(id){
  const c=catById(id);
  const name=prompt('Rename category',c?.name||'');
  if(!name||name.trim()===c.name)return;
  const{error}=await db.from('categories').update({name:name.trim()}).eq('id',id);
  if(error){toast('Failed: '+error.message);return;}
  await loadCats();renderCats();
}
async function archiveCat(id,arch){
  await db.from('categories').update({is_archived:arch}).eq('id',id);
  await loadCats();renderCats();
}
async function addRule(){
  const pat=$('#newRulePat').value.trim().toLowerCase();
  if(!pat)return;
  await rememberRule(pat,$('#newRuleCat').value);
  renderCats();
}
async function deleteRule(id){
  await db.from('merchant_rules').delete().eq('id',id);
  await loadRules();renderCats();
}
async function addKeyword(){
  const kw=$('#newKeyword').value.trim().toLowerCase();
  if(!kw)return;
  const{error}=await db.from('category_keywords').upsert({keyword:kw,category_id:$('#newKeywordCat').value},{onConflict:'keyword'});
  if(error){toast(error.message.includes('duplicate')?'That keyword already exists':'Failed: '+error.message);return;}
  await loadKeywords();renderCats();toast('Keyword hint added');
}
async function deleteKeyword(id){
  await db.from('category_keywords').delete().eq('id',id);
  await loadKeywords();renderCats();
}

/* ── TOAST / TIPS ── */
let toastTimer;
function toast(msg,action){
  const el=$('#toast');
  el.innerHTML=esc(msg)+(action?` <button id="toastBtn">${esc(action.label)}</button>`:'');
  el.style.display='flex';
  if(action)$('#toastBtn').onclick=()=>{el.style.display='none';action.fn();};
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.style.display='none',action?10000:4000);
}
function bindTips(root){
  root.querySelectorAll('[data-tip]').forEach(n=>{
    n.addEventListener('mouseenter',()=>{const t=$('#tip');t.textContent=n.dataset.tip;t.style.display='block';});
    n.addEventListener('mousemove',e=>{const t=$('#tip');t.style.left=Math.min(e.clientX+12,window.innerWidth-t.offsetWidth-8)+'px';t.style.top=(e.clientY+14)+'px';});
    n.addEventListener('mouseleave',()=>$('#tip').style.display='none');
  });
}
</script>
